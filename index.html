<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- Viewport mit safe-area Support für iOS Notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- PWA / iOS Home-Bildschirm -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#EF4444">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Health">

  <!-- Apple Touch Icons (alle Größen + precomposed Fallback) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png?v=1">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png?v=1">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png?v=1">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png?v=1">
  <link rel="apple-touch-icon-precomposed" href="icons/icon-180.png?v=1">

  <!-- Browser-Favicon (Safari-Tab, Lesezeichen) -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png?v=1">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg?v=1">

  <title>Health Command Center</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
</head>
<body class="theme-overview">

<!-- Login-Overlay (vor OAuth) -->
<div id="login-screen" class="overlay-screen" style="display:none">
  <div class="overlay-icon">❤️</div>
  <div class="overlay-title">Health Command Center</div>
  <div class="overlay-sub">Bitte mit Google anmelden</div>
  <button onclick="signIn()" class="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#fff" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/>
      <path fill="#fff" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/>
      <path fill="#fff" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9.008 9.008 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/>
      <path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"/>
    </svg>
    Mit Google anmelden
  </button>
</div>

<!-- Loading-Overlay -->
<div id="loading" class="overlay-screen">
  <div class="spin"></div>
  <p class="ld-txt">Health Command Center wird geladen…</p>
</div>

<!-- Error-Overlay -->
<div id="err-screen" class="overlay-screen" style="display:none">
  <div class="overlay-icon">⚠️</div>
  <p class="err-msg" id="err-txt"></p>
</div>

<!-- Top-Bar: globale Controls (Datums-Nav + Refresh + Dark + Filter) -->
<header id="topbar">
  <div class="tb-row tb-row-main">
    <div class="date-nav">
      <button class="nav-arrow" id="nav-prev" aria-label="Zurück">‹</button>
      <span id="nav-label">–</span>
      <button class="nav-arrow" id="nav-next" aria-label="Vor">›</button>
      <button class="nav-arrow" id="nav-today" title="Heute" aria-label="Heute">↺</button>
    </div>
    <div class="tb-actions">
      <button id="refresh-btn" class="nav-arrow" title="Daten neu laden" aria-label="Refresh">↻</button>
      <button id="dark-toggle" class="nav-arrow" title="Hell/Dunkel" aria-label="Theme">🌙</button>
    </div>
  </div>
  <div class="tbg">
    <button class="tbtn" data-range="heute">Heute</button>
    <button class="tbtn active" data-range="7d">7D</button>
    <button class="tbtn" data-range="1m">1M</button>
    <button class="tbtn" data-range="3m">3M</button>
    <button class="tbtn" data-range="6m">6M</button>
    <button class="tbtn" data-range="12m">12M</button>
    <button class="tbtn" data-range="24m">24M</button>
  </div>
</header>

<!-- App-Bereich: horizontaler Snap-Scroller mit allen Tabs nebeneinander -->
<div id="app">
  <div id="tab-container">
    <section id="screen-overview"   class="screen"></section>
    <section id="screen-herz"       class="screen"></section>
    <section id="screen-schlaf"     class="screen"></section>
    <section id="screen-aktivitaet" class="screen"></section>
    <section id="screen-training"   class="screen"></section>
    <section id="screen-vo2"        class="screen"></section>
  </div>
</div>

<!-- Bottom-Nav: 6 Tabs mit SVG-Icons -->
<nav id="bottom-nav" aria-label="Hauptnavigation">
  <button class="nav-btn active" id="nav-overview" data-tab="overview" aria-label="Übersicht">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12 12 4l9 8v8a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1Z"/></svg>
    <span>Übersicht</span>
  </button>
  <button class="nav-btn" id="nav-herz" data-tab="herz" aria-label="Herz">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6.5 5c2 0 3.5 1 5.5 3.5C14 6 15.5 5 17.5 5c4 0 5.5 4 4 7-2.5 4.5-9.5 9-9.5 9Z"/></svg>
    <span>Herz</span>
  </button>
  <button class="nav-btn" id="nav-schlaf" data-tab="schlaf" aria-label="Schlaf">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 1 1 9.5 4c0 5.5 4.5 10 10.5 10.5Z"/></svg>
    <span>Schlaf</span>
  </button>
  <button class="nav-btn" id="nav-aktivitaet" data-tab="aktivitaet" aria-label="Aktivität">
    <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="13" cy="4.5" r="1.5"/><path d="m4 19 4-4 2 2 3-7 4 4h4M8 15l3-6"/></svg>
    <span>Aktivität</span>
  </button>
  <button class="nav-btn" id="nav-training" data-tab="training" aria-label="Training">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 8v8M9 5v14M15 5v14M18 8v8M3 10v4M21 10v4"/></svg>
    <span>Training</span>
  </button>
  <button class="nav-btn" id="nav-vo2" data-tab="vo2" aria-label="VO₂max">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v16M6 9a4 4 0 0 1 4-4h0v15c-4 0-4-4-4-6Zm12 0c0-2.2-1.8-4-4-4h0v15c4 0 4-4 4-6Z"/></svg>
    <span>VO₂max</span>
  </button>
</nav>

<script src="app.js" defer></script>
</body>
</html>
